reference:
- title: Classes
  desc:  Data structures of the key model components.
  contents:
  # - calendar-class
  # - commodity-class
  # - demand-class
  # - supply-class
  # - technology-class
  # - storage-class
  # - trade-class
  # - import-class
  # - export-class
  - ends_with("class")
  - starts_with("class")

- title: Building a model
  desc:  Functions to create model components.
  contents:
  - starts_with("new")
  - starts_with("make_")
  - matches("initialize")
  - matches("update")
  - starts_with("add")

- title: Configuration and Settings
  desc:  Model configuration and scenario settings
  contents:
  - ends_with("onfig")
  - ends_with("ettings")
  - ends_with("alendar")
  - ends_with("orizon")
  - calendars
  - horizons

- title: Solving
  contents:
  - starts_with("interpolate")
  - starts_with("write")
  - starts_with("read")
  - starts_with("solve")
  - matches("mapping")
  - trim_parameters_by_maps
  - validate_scenario_parameters

- title: Remote solver (NEOS)
  contents:
  - starts_with("neos")

- title: Reporting
  contents:
  - starts_with("report")

- title: Data manimulation
  contents:
  - matches("convert")
  - matches("data")
  - getObject
  - getMix
  - matches("find")
  - matches("rename")
  - matches("revalue")
  - matches("size")
  - matches("hour2HOUR")
  - matches("yday2YDAY")
  - matches("tsl2dtm")
  - matches("dtm2tsl")
  - matches("tsl_formats")
  - matches("^tsl")
  - matches("tsl_guess_format")
  - matches("drop_na_cols")
  - matches("obj2mem")
  - matches("isInMemory")
  - matches("register")
  - matches("get_registry")
  - matches("save_scenario")
  - matches("load_scenario")
  - starts_with("utopia")


- title: Visualisation
  contents:
  - matches("draw")
  - matches("plot")
  - matches("show")
  - matches("design")

- title: Validation
  contents:
  - starts_with("check")
  - matches("levcost")
  - tech_share_frontier

- title: Exporting
  contents:
  - starts_with("print")
  - starts_with("summary")

- title: energyRt options and settings
  contents:
  - starts_with("set")
  - matches("make_scenario_dirname")

- title: utils
  contents:
  - starts_with("en_install")
  - starts_with("en_setup")
  - starts_with("en_check")
  - matches("en_obj2df")
  - starts_with("collect_")
  - starts_with("get_")
  - starts_with("complete_")
  - starts_with("expand_")
  - matches("countdown_timer")
  - matches("map_|named_|is_")
  # - get_slot_info

# - title: All other
#   contents: lacks_concepts("none")

footer:
  structure:
    left: package
    right: built_with

home:
  sidebar:
    structure: [links, license, community, citation, dev]
